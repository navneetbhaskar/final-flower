<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special 🌸</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(
    135deg,
    #ff9a9e 0%,
    #fad0c4 25%,
    #fbc2eb 55%,
    #a18cd1 100%);
    position:relative;
}

/* Floating Flowers */

.flower{
    position:absolute;
    font-size:30px;
    animation:float linear infinite;
    opacity:0.8;
}

@keyframes float{
    from{
        transform:translateY(110vh) rotate(0deg);
    }
    to{
        transform:translateY(-120vh) rotate(360deg);
    }
}

/* Card */

.container{
    width:min(92%, 900px);
    z-index:10;
}

.card{
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.3);
    border-radius:30px;
    padding:50px;
    text-align:center;
    box-shadow:0 25px 50px rgba(0,0,0,0.2);
    animation:fadeUp 1.5s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    font-family:'Great Vibes',cursive;
    font-size:4rem;
    color:white;
    margin-bottom:20px;
}

.subtitle{
    color:white;
    font-size:1.1rem;
    line-height:1.8;
    margin-bottom:30px;
}

.line{
    width:120px;
    height:4px;
    background:white;
    margin:auto;
    border-radius:20px;
}

.btn{
    margin-top:35px;
    padding:14px 35px;
    border:none;
    border-radius:50px;
    background:white;
    color:#d63384;
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    transition:0.4s;
}

.btn:hover{
    transform:translateY(-5px) scale(1.05);
    box-shadow:0 15px 30px rgba(255,255,255,.4);
}

.message{
    margin-top:25px;
    color:white;
    font-size:1.1rem;
    opacity:0;
    transition:0.8s;
}

.show{
    opacity:1;
}

.glow{
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(255,255,255,0.15);
    border-radius:50%;
    filter:blur(100px);
}

.g1{
    top:-150px;
    left:-150px;
}

.g2{
    bottom:-150px;
    right:-150px;
}

@media(max-width:768px){

h1{
    font-size:3rem;
}

.card{
    padding:35px 25px;
}

.subtitle{
    font-size:1rem;
}

}
.page-exit{
    position:fixed;
    inset:0;
    background:linear-gradient(
    135deg,
    #ff9a9e 0%,
    #fad0c4 25%,
    #fbc2eb 55%,
    #a18cd1 100%);
    z-index:99999;
    opacity:0;
    pointer-events:none;
    transition:opacity .8s ease;
}

.page-exit.active{
    opacity:1;
}
    /* Mobile Phones */
@media (max-width: 480px){

    .card{
        padding:25px 20px;
        border-radius:20px;
    }

    h1{
        font-size:2.5rem;
    }

    .subtitle{
        font-size:0.95rem;
        line-height:1.6;
    }

    .btn{
        padding:12px 28px;
        font-size:0.95rem;
    }

    .flower{
        font-size:24px !important;
    }
}

/* Tablets */
@media (min-width: 481px) and (max-width: 768px){

    .card{
        padding:35px 25px;
    }

    h1{
        font-size:3rem;
    }

    .subtitle{
        font-size:1rem;
    }
}

/* Small Laptops */
@media (min-width: 769px) and (max-width: 1200px){

    h1{
        font-size:4rem;
    }

    .container{
        max-width:850px;
    }
}

/* Large Screens */
@media (min-width: 1201px){

    .container{
        max-width:950px;
    }

    h1{
        font-size:4.8rem;
    }

    .subtitle{
        font-size:1.2rem;
    }

    .card{
        padding:60px;
    }
}
</style>
</head>

<body>

<div class="glow g1"></div>
<div class="glow g2"></div>

<div id="flowers"></div>

<div class="container">
    <div class="card">

        <h1>For You 🌻</h1>

        <div class="line"></div>

        <p class="subtitle">
            🌹You are a beautiful combination of kindness, elegance, strength and endless positivity🌹
        </p>

        <button class="btn" onclick="openFlower()">
    Open Surprise ✨
</button>

        <p id="msg" class="message">
           
        </p>

    </div>
</div>

<script>

const flowers=document.getElementById('flowers');

const emojis=['🌸','🌺','🌷','🌹','💮','🌼'];

for(let i=0;i<35;i++){

    const flower=document.createElement('div');

    flower.classList.add('flower');

    flower.innerHTML=
    emojis[Math.floor(Math.random()*emojis.length)];

    flower.style.left=Math.random()*100+'vw';

    flower.style.fontSize=
    (20+Math.random()*30)+'px';

    flower.style.animationDuration=
    (10+Math.random()*15)+'s';

    flower.style.animationDelay=
    Math.random()*5+'s';

    flowers.appendChild(flower);
}

function openFlower(){

    const overlay=document.createElement('div');
    overlay.className='page-exit';

    document.body.appendChild(overlay);

    requestAnimationFrame(()=>{
        overlay.classList.add('active');
    });

    setTimeout(()=>{
        window.location.href='flower.html';
    },800);
}

</script>

</body>
</html>
